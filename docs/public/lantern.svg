<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="200" height="250" fill="none">
  <!-- Glow halo -->
  <circle cx="200" cy="220" r="150" fill="#fef3c7" opacity="0.4"/>
  <circle cx="200" cy="220" r="105" fill="#fde68a" opacity="0.3"/>

  <!-- Hanging ring -->
  <circle cx="200" cy="35" r="12" stroke="#92400e" stroke-width="3" fill="none"/>

  <!-- Hanging wire -->
  <line x1="200" y1="47" x2="200" y2="72" stroke="#92400e" stroke-width="3"/>

  <!-- Peaked roof -->
  <path d="M140 110 L200 70 L260 110 Z" fill="#b45309" stroke="#92400e" stroke-width="2" stroke-linejoin="round"/>

  <!-- Roof base -->
  <rect x="135" y="108" width="130" height="14" rx="3" fill="#d97706" stroke="#92400e" stroke-width="2"/>

  <!-- Top trim band -->
  <rect x="145" y="122" width="110" height="8" rx="2" fill="#b45309"/>

  <!-- Lantern glass case -->
  <rect x="140" y="133" width="120" height="172" rx="8" fill="#fefce8" stroke="#d97706" stroke-width="3"/>

  <!-- Inner glow behind flame -->
  <rect x="155" y="153" width="90" height="135" rx="6" fill="#fef3c7" opacity="0.7"/>

  <!-- Vertical frame bars -->
  <line x1="170" y1="133" x2="170" y2="305" stroke="#d97706" stroke-width="2"/>
  <line x1="230" y1="133" x2="230" y2="305" stroke="#d97706" stroke-width="2"/>

  <!-- Horizontal cross-bar -->
  <line x1="140" y1="220" x2="260" y2="220" stroke="#d97706" stroke-width="2" opacity="0.5"/>

  <!-- Flame outer -->
  <path d="M200 195 Q183 222 193 252 Q200 263 207 252 Q217 222 200 195 Z" fill="#f59e0b"/>

  <!-- Flame inner -->
  <path d="M200 210 Q192 228 197 247 Q200 254 203 247 Q208 228 200 210 Z" fill="#fbbf24"/>

  <!-- Bottom trim band -->
  <rect x="145" y="306" width="110" height="8" rx="2" fill="#b45309"/>

  <!-- Bottom plate -->
  <rect x="135" y="314" width="130" height="14" rx="3" fill="#d97706" stroke="#92400e" stroke-width="2"/>

  <!-- Foot -->
  <rect x="155" y="328" width="90" height="10" rx="2" fill="#92400e"/>

  <!-- Light rays -->
  <line x1="80" y1="220" x2="65" y2="220" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="320" y1="220" x2="335" y2="220" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="155" x2="85" y2="145" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="155" x2="315" y2="145" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="290" x2="85" y2="300" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="290" x2="315" y2="300" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
</svg>
