<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" rx="12" fill="#f8f9fa"/>

  <!-- Pass 0 -->
  <rect x="16" y="24" width="164" height="152" rx="8" fill="white" filter="url(#shadow)" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="16" y="24" width="164" height="32" rx="8" fill="#f3f4f6"/>
  <rect x="16" y="48" width="164" height="8" fill="#f3f4f6"/>
  <text x="98" y="46" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Pass 0</text>
  <text x="98" y="76" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Pre-flight</text>
  <text x="98" y="100" font-size="11" fill="#6b7280" text-anchor="middle">Run formatter</text>
  <text x="98" y="118" font-size="11" fill="#6b7280" text-anchor="middle">Review changes</text>
  <text x="98" y="136" font-size="11" fill="#6b7280" text-anchor="middle">Independence gate</text>
  <text x="98" y="154" font-size="11" fill="#6b7280" text-anchor="middle">Count commits</text>

  <!-- Arrow 1 -->
  <path d="M188 100 L204 100" stroke="#d1d5db" stroke-width="2" fill="none"/>
  <polygon points="204,95 214,100 204,105" fill="#d1d5db"/>

  <!-- Pass 1 -->
  <rect x="220" y="24" width="148" height="152" rx="8" fill="white" filter="url(#shadow)" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="220" y="24" width="148" height="32" rx="8" fill="#fefce8"/>
  <rect x="220" y="48" width="148" height="8" fill="#fefce8"/>
  <text x="294" y="46" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">Pass 1</text>
  <text x="294" y="76" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Content</text>
  <text x="294" y="100" font-size="11" fill="#6b7280" text-anchor="middle">Stage selectively</text>
  <text x="294" y="118" font-size="11" fill="#6b7280" text-anchor="middle">Review staged diff</text>
  <text x="294" y="136" font-size="11" fill="#6b7280" text-anchor="middle">Verify completeness</text>
  <text x="294" y="154" font-size="11" fill="#6b7280" text-anchor="middle">Coherence test</text>

  <!-- Arrow 2 -->
  <path d="M376 100 L392 100" stroke="#d1d5db" stroke-width="2" fill="none"/>
  <polygon points="392,95 402,100 392,105" fill="#d1d5db"/>

  <!-- Pass 2 -->
  <rect x="408" y="24" width="148" height="152" rx="8" fill="white" filter="url(#shadow)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="408" y="24" width="148" height="32" rx="8" fill="#eff6ff"/>
  <rect x="408" y="48" width="148" height="8" fill="#eff6ff"/>
  <text x="482" y="46" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">Pass 2</text>
  <text x="482" y="76" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Standards</text>
  <text x="482" y="100" font-size="11" fill="#6b7280" text-anchor="middle">Subject line check</text>
  <text x="482" y="118" font-size="11" fill="#6b7280" text-anchor="middle">Body format check</text>
  <text x="482" y="136" font-size="11" fill="#6b7280" text-anchor="middle">Imperative mood</text>
  <text x="482" y="154" font-size="11" fill="#6b7280" text-anchor="middle">50 / 72 char limits</text>

  <!-- Arrow 3 -->
  <path d="M564 100 L580 100" stroke="#d1d5db" stroke-width="2" fill="none"/>
  <polygon points="580,95 590,100 580,105" fill="#d1d5db"/>

  <!-- Pass 3 -->
  <rect x="596" y="24" width="148" height="152" rx="8" fill="white" filter="url(#shadow)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="596" y="24" width="148" height="32" rx="8" fill="#f5f3ff"/>
  <rect x="596" y="48" width="148" height="8" fill="#f5f3ff"/>
  <text x="670" y="46" font-size="12" font-weight="600" fill="#5b21b6" text-anchor="middle">Pass 3</text>
  <text x="670" y="76" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Review</text>
  <text x="670" y="100" font-size="11" fill="#6b7280" text-anchor="middle">One complete idea?</text>
  <text x="670" y="118" font-size="11" fill="#6b7280" text-anchor="middle">Tests pass?</text>
  <text x="670" y="136" font-size="11" fill="#6b7280" text-anchor="middle">Revertible?</text>
  <text x="670" y="154" font-size="11" fill="#6b7280" text-anchor="middle">Commit</text>

  <!-- Arrow 4 -->
  <path d="M752 100 L768 100" stroke="#d1d5db" stroke-width="2" fill="none"/>
  <polygon points="768,95 778,100 768,105" fill="#d1d5db"/>

  <!-- Pass 4 -->
  <rect x="784" y="24" width="160" height="152" rx="8" fill="white" filter="url(#shadow)" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="784" y="24" width="160" height="32" rx="8" fill="#f0fdf4"/>
  <rect x="784" y="48" width="160" height="8" fill="#f0fdf4"/>
  <text x="864" y="46" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">Pass 4</text>
  <text x="864" y="76" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Verify</text>
  <text x="864" y="100" font-size="11" fill="#6b7280" text-anchor="middle">No hitchhikers</text>
  <text x="864" y="118" font-size="11" fill="#6b7280" text-anchor="middle">No stowaways</text>
  <text x="864" y="136" font-size="11" fill="#6b7280" text-anchor="middle">Clean revert?</text>
  <text x="864" y="154" font-size="11" fill="#6b7280" text-anchor="middle">Session coherence</text>
</svg>
