<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 336" fill="none">
  <defs>
    <style>
      .col-bg { fill: #f0f1f4; }
      .col-header { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 19px; font-weight: 700; fill: #4b5563; text-transform: uppercase; letter-spacing: 0.06em; }
      .card { fill: #ffffff; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }
      .card-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; fill: #1f2937; }
      .card-id { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #9ca3af; }
      .card-moving { fill: #ffffff; filter: drop-shadow(0 12px 36px rgba(99,102,241,0.35)); }
      .moving-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: 600; fill: #1f2937; }
      .moving-id { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #9ca3af; }
      .accent-dot { fill: #6366f1; }
      .done-dot { fill: #22c55e; }
      .motion-line { stroke: #6366f1; stroke-linecap: round; }
      .col-count { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; fill: #9ca3af; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="336" fill="#fafafa" rx="14"/>

  <!-- Column: Doing -->
  <rect class="col-bg" x="19" y="17" width="204" height="302" rx="12"/>
  <text class="col-header" x="38" y="53">Doing</text>
  <text class="col-count" x="120" y="53">1</text>

  <!-- Doing: ghost outline where the card is leaving -->
  <rect x="34" y="72" width="175" height="72" rx="10" fill="none" stroke="#d1d5db" stroke-width="1.8" stroke-dasharray="7 5" opacity="0.4"/>

  <!-- Doing: a second card still in place -->
  <rect class="card" x="34" y="158" width="175" height="72" rx="10"/>
  <circle class="accent-dot" cx="53" cy="187" r="5"/>
  <text class="card-text" x="67" y="192">Add dark mode</text>
  <text class="card-id" x="67" y="214">PG-142</text>

  <!-- Column: Done -->
  <rect class="col-bg" x="497" y="17" width="204" height="302" rx="12"/>
  <text class="col-header" x="516" y="53">Done</text>
  <text class="col-count" x="586" y="53">2</text>

  <!-- Done cards -->
  <rect class="card" x="511" y="72" width="175" height="72" rx="10"/>
  <circle class="done-dot" cx="530" cy="101" r="5"/>
  <text class="card-text" x="545" y="106">Set up CI</text>
  <text class="card-id" x="545" y="127">PG-135</text>

  <rect class="card" x="511" y="158" width="175" height="72" rx="10"/>
  <circle class="done-dot" cx="530" cy="187" r="5"/>
  <text class="card-text" x="545" y="192">Add onboarding</text>
  <text class="card-id" x="545" y="214">PG-136</text>

  <!-- The moving card: BIG, centred between columns -->
  <g transform="translate(238, 82)">
    <!-- Motion lines behind card — prominent streaks -->
    <line class="motion-line" x1="-5" y1="34" x2="-58" y2="34" stroke-width="5" opacity="0.3"/>
    <line class="motion-line" x1="-5" y1="50" x2="-67" y2="50" stroke-width="4" opacity="0.25"/>
    <line class="motion-line" x1="-5" y1="67" x2="-53" y2="67" stroke-width="3.5" opacity="0.2"/>
    <line class="motion-line" x1="-5" y1="84" x2="-62" y2="84" stroke-width="4" opacity="0.15"/>
    <line class="motion-line" x1="-5" y1="101" x2="-48" y2="101" stroke-width="3" opacity="0.1"/>

    <!-- Card -->
    <rect class="card-moving" x="0" y="0" width="245" height="130" rx="12"/>
    <circle cx="29" cy="48" r="7" fill="#6366f1"/>
    <text class="moving-text" x="48" y="55">Refactor auth</text>
    <text class="moving-id" x="48" y="86">PG-139</text>

    <!-- Arrow ahead of card -->
    <polygon points="254,58 274,65 254,72" fill="#6366f1" opacity="0.35"/>
  </g>

  <!-- Subtle connecting dash from Doing ghost to moving card -->
  <path d="M 209 108 L 233 108" fill="none" stroke="#6366f1" stroke-width="1.8" opacity="0.15" stroke-dasharray="5 4"/>
</svg>
