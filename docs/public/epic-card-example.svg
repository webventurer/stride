<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 870" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- Card -->
  <rect x="1" y="1" width="758" height="868" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" rx="10"/>

  <!-- Title -->
  <text x="32" y="56" font-size="22" font-weight="700" fill="#111827">Epic: Build the orchard catalogue</text>

  <!-- Why this matters -->
  <text x="32" y="108" font-size="16" font-weight="700" fill="#111827">Why this matters</text>
  <text x="32" y="138" font-size="14" fill="#374151">The catalogue lists every fruit as one generic "fruit" row. Customers</text>
  <text x="32" y="158" font-size="14" fill="#374151">asking for apples can't find them, and the inventory team can't track</text>
  <text x="32" y="178" font-size="14" fill="#374151">varieties separately.</text>

  <!-- What success looks like -->
  <text x="32" y="220" font-size="16" font-weight="700" fill="#111827">What success looks like</text>
  <text x="32" y="250" font-size="14" fill="#374151">Customers can browse apples, pears, and plums separately, with</text>
  <text x="32" y="270" font-size="14" fill="#374151">ripeness and harvest date visible per item.</text>

  <!-- What we agreed -->
  <text x="32" y="312" font-size="16" font-weight="700" fill="#111827">What we agreed</text>
  <text x="32" y="342" font-size="14" fill="#374151">Use a single Variety model with a `kind` enum (apple / pear / plum)</text>
  <text x="32" y="362" font-size="14" fill="#374151">rather than one model per fruit type. Cheaper to extend later.</text>

  <!-- What we won't touch -->
  <text x="32" y="404" font-size="16" font-weight="700" fill="#111827">What we won't touch</text>
  <text x="32" y="434" font-size="14" fill="#374151">• Citrus or stone fruit — out of scope until apples/pears/plums ship</text>
  <text x="32" y="454" font-size="14" fill="#374151">• Wholesale pricing rules — handled by the pricing service, not here</text>

  <!-- Divider above sub-issues panel -->
  <line x1="0" y1="494" x2="760" y2="494" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Sub-issues header -->
  <g transform="translate(32, 524)">
    <!-- Disclosure triangle -->
    <path d="M 4 6 L 12 2 L 12 10 Z" fill="#6b7280"/>
    <text x="20" y="10" font-size="14" font-weight="600" fill="#374151">Sub-issues</text>
    <!-- Progress circle -->
    <circle cx="120" cy="6" r="6" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="135" y="11" font-size="13" fill="#6b7280">0/8</text>
  </g>

  <!-- Column headers -->
  <text x="569" y="552" font-size="11" font-weight="600" fill="#6b7280" text-anchor="middle">Blocked by</text>
  <text x="649" y="552" font-size="11" font-weight="600" fill="#6b7280" text-anchor="middle">Blocking</text>

  <!-- Sub-issue rows -->
  <!-- Row 1 -->
  <g transform="translate(32, 564)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Each fruit shows its variety and harvest date</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">2</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(32, 594)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Providers stay within their rate limits</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(32, 624)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">New fruit lands tagged with its variety</text>
    <rect x="520" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="537" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">2</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(32, 654)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Concurrency is set explicitly per environment</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">2</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 5 -->
  <g transform="translate(32, 684)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Parallel variety queries stay fast</text>
    <rect x="520" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="537" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 6 -->
  <g transform="translate(32, 714)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">One bad orchard doesn't take down the rest</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 7 -->
  <g transform="translate(32, 744)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Roll out parallel processing gradually</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">7</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Row 8 -->
  <g transform="translate(32, 774)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="13" font-size="13" fill="#111827">Customers see batch progress, not per-fruit</text>
    <rect x="520" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="537" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <rect x="600" y="0" width="34" height="18" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="9"/>
    <text x="617" y="13" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">1</text>
    <circle cx="700" cy="8" r="11" fill="#6366f1"/>
    <text x="700" y="12" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">MM</text>
  </g>

  <!-- Footer caption -->
  <text x="32" y="837" font-size="12" font-style="italic" fill="#9ca3af">Mock-up. Each sub-issue ships as one PR; the parent moves Done when the last sub-issue closes.</text>
</svg>
